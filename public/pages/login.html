<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LinguaLearn</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">🌐</div>
        <div class="auth-brand-name">LinguaLearn</div>
        <div class="auth-brand-sub">Welcome back! Let's continue learning.</div>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@email.com" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Your password" required />
        </div>

        <button type="submit" class="auth-submit">Login 🔓</button>
        <div class="auth-msg" id="authMsg"></div>
      </form>

      <div class="auth-footer">
        New here? <a href="/signup" style="color:#6366f1;font-weight:700">Create a free account</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
