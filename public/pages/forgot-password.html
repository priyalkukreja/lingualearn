<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — LinguaLearn</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="stylesheet" href="/css/lottie-animations.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <dotlottie-player src="https://lottie.host/27291402-e430-4c34-9d6e-34ebc0eb0f4b/G2q4TiGp7Q.json" background="transparent" speed="1" loop autoplay class="lottie-card-icon lottie-float"></dotlottie-player>
        <div class="auth-brand-name">LinguaLearn</div>
        <div class="auth-brand-sub">Forgot your password? No worries — we'll send you a reset link.</div>
      </div>

      <form class="auth-form" id="resetForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@email.com" required />
        </div>

        <button type="submit" class="btn btn-primary auth-submit-btn" id="resetBtn">
          <span id="resetText">Send Reset Link</span>
          <span class="spinner" id="resetSpinner" style="display:none"></span>
        </button>

        <div class="auth-message" id="authMessage" style="display:none"></div>
      </form>

      <div class="auth-footer">
        <p>Remember your password? <a href="/login">Log in</a></p>
        <p>Don't have an account? <a href="/signup">Sign up free</a></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;

      const btn = document.getElementById('resetBtn');
      const text = document.getElementById('resetText');
      const spinner = document.getElementById('resetSpinner');
      const msg = document.getElementById('authMessage');

      btn.disabled = true;
      text.textContent = 'Sending...';
      spinner.style.display = 'inline-block';
      msg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        msg.style.display = '';
        if (res.ok) {
          msg.className = 'auth-message success';
          msg.textContent = data.message || 'Reset link sent! Check your email.';
          document.getElementById('resetForm').reset();
        } else {
          msg.className = 'auth-message error';
          msg.textContent = data.error || 'Something went wrong. Try again.';
        }
      } catch (err) {
        msg.style.display = '';
        msg.className = 'auth-message error';
        msg.textContent = 'Network error. Check your connection.';
      }

      text.textContent = 'Send Reset Link';
      spinner.style.display = 'none';
      btn.disabled = false;
    });
  </script>
</body>
</html>
